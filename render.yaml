services:
  - type: web
    name: justicia-ia
    env: docker
    plan: free
    region: oregon
    dockerFilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 8501
      - key: PYTHON_VERSION
        value: 3.11.0
      # ── Secretos: configúralos en el Dashboard de Render (no los escribas aquí) ──
      - key: MONGODB_URI
        sync: false   # Render te pedirá el valor en su panel web
      - key: GROQ_API_KEY
        sync: false   # La API Key de Groq va aquí para máxima seguridad
